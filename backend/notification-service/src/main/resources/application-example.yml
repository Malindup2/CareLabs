# ============================================================
# Notification Service - application-example.yml
# Copy to application.yml and fill in your actual values.
# ============================================================

server:
  port: 8086

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/carelabs_notifications
    username: postgres
    password: rootpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_gmail@gmail.com      # <-- your Gmail address
    password: your_app_password          # <-- Gmail App Password (NOT your login password)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # Scheduling enabled for 2-hour appointment reminders
  task:
    scheduling:
      enabled: true

# Internal service base URLs (no trailing slash)
services:
  auth-url: http://localhost:8081
  appointment-url: http://localhost:8084

app:
  mail:
    from: your_gmail@gmail.com           # <-- must match spring.mail.username
    from-name: CareLabs Platform
  # Admin email for refund-related notifications
  admin-email: your_gmail@gmail.com