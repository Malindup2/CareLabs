# ============================================
# API Gateway - Example Configuration
# ============================================
# Copy this file to application.yml and update values as needed.

server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: patient-service
          uri: http://localhost:8082
          predicates:
            - Path=/patients/**

        - id: doctor-service-protected
          uri: http://localhost:8083
          predicates:
            - Path=/doctors/me,/doctors/me/**,/doctors/documents/**,/doctors/availability/**,/doctors/leave/**,/doctors/admin/**,/doctors/*/verify

        - id: doctor-service-public
          uri: http://localhost:8083
          predicates:
            - Path=/doctors,/doctors/*,/doctors/*/availability

        - id: appointment-service
          uri: http://localhost:8084
          predicates:
            - Path=/appointments/**

        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/notifications/**

        - id: payment-service
          uri: http://localhost:8087
          predicates:
            - Path=/payments/**

        - id: ai-symptom-service
          uri: http://localhost:8088
          predicates:
            - Path=/ai/**
