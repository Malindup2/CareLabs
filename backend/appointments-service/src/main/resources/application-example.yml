# ============================================
# Appointment Service - Example Configuration
# ============================================
# Copy this file to application.yml and update values as needed.

server:
  port: 8084

spring:
  application:
    name: appointments-service

  datasource:
    url: jdbc:postgresql://localhost:5432/carelabs_appointments
    username: your_db_username
    password: your_db_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

pricing:
  consultation:
    default-fee: 1500.00
    in-clinic-fee: 1500.00
    telemedicine-fee: 1200.00

integration:
  auth-service:
    base-url: http://localhost:8081
  patient-service:
    base-url: http://localhost:8082
  doctor-service:
    base-url: http://localhost:8083
