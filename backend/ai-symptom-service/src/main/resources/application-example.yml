# ============================================
# AI Symptom Service - Example Configuration
# ============================================
# Copy this file to application.yml and update values as needed.

server:
  port: 8088

spring:
  application:
    name: ai-symptom-service

llm:
  provider: openai  # gemini or openai  change based on what you use


gemini:
  api:
    key: your_gemini_api_key_here
    model: gemini-2.5-flash


openai:
  api:
    key: your_openai_api_key
    model: gpt-4.1-mini
