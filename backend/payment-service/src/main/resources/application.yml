server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carelabs_payments}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.carelabs.*"

pricing:
  consultation:
    default-fee: 1500.00
  platform-fee-ratio: 0.10

integration:
  appointments-service:
    base-url: ${APPOINTMENTS_SERVICE_URL:http://localhost:8084}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

# Custom PayHere Configuration
