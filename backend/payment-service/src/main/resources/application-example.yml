# ============================================
# Payment Service - Example Configuration
# ============================================
# Copy this file to application.yml and update values as needed.

server:
  port: 8085

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/carelabs_payments
    username: your_db_username
    password: your_db_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

pricing:
  consultation:
    default-fee: 1500.00
  platform-fee-ratio: 0.10

integration:
  appointments-service:
    base-url: ${APPOINTMENTS_SERVICE_BASE_URL:http://localhost:8084}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

