# ============================================
# Payment Service - Example Configuration
# ============================================
# Copy this file to application.yml and update values as needed.

server:
  port: 8087

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/carelabs_payments
    username: your_db_username
    password: your_db_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Payment Gateway Configuration (PayHere / Stripe)
