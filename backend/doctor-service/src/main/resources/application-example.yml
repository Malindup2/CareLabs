# ============================================
# Doctor Service - Example Configuration
# ============================================
# Copy this file to application.yml and update values as needed.

server:
  port: 8083

spring:
  application:
    name: doctor-service

  datasource:
    url: jdbc:postgresql://localhost:5432/carelabs_doctors
    username: your_db_username
    password: your_db_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your_cloud_name}
  api-key: ${CLOUDINARY_API_KEY:your_api_key}
  api-secret: ${CLOUDINARY_API_SECRET:your_api_secret}
