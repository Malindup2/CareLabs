apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-secret
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "rootpassword"
  JWT_SECRET: "your-512-bit-secret-key-goes-here-make-it-long-and-secure"
