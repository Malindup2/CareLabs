apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  # Service URLs for API Gateway
  AUTH_SERVICE_URL: "http://auth-service:8081"
  PATIENT_SERVICE_URL: "http://patient-service:8082"
  DOCTOR_SERVICE_URL: "http://doctor-service:8083"
  APPOINTMENTS_SERVICE_URL: "http://appointments-service:8084"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8086"
  PAYMENT_SERVICE_URL: "http://payment-service:8085"
  AI_SYMPTOM_SERVICE_URL: "http://ai-symptom-service:8088"
---
apiVersion: v1
kind: Secret
metadata:
  name: shared-secret
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "rootpassword"
  JWT_SECRET: "your-512-bit-secret-key-goes-here"
