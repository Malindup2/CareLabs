apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
      - name: ai-symptom-service
        image: <your-dockerhub-username>/carelabs-ai-symptom-service:latest
        ports:
        - containerPort: 8087
        envFrom:
        - configMapRef:
            name: shared-config
        - secretRef:
            name: shared-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  selector:
    app: ai-symptom-service
  ports:
    - protocol: TCP
      port: 8087
      targetPort: 8087
