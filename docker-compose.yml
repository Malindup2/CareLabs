# CareLabs Full-Stack Orchestration
version: '3.8'

services:
  # ─── Infrastructure Layer ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: carelabs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: carelabs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: carelabs-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 30000

  # ─── Backend Services Layer ──────────────────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: carelabs-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  patient-service:
    build: ./backend/patient-service
    container_name: carelabs-patient-service
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: patient-service
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_patients
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INTEGRATION_AUTH_SERVICE_BASE_URL: http://auth-service:8081
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      CLOUDINARY_CLOUD_NAME: dpt2jyif5
      CLOUDINARY_API_KEY: 791878353926865
      CLOUDINARY_API_SECRET: AF5KmtdawbrBU0V8cIh6xguF3pg
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  doctor-service:
    build: ./backend/doctor-service
    container_name: carelabs-doctor-service
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: doctor-service
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_doctors
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      CLOUDINARY_CLOUD_NAME: dpt2jyif5
      CLOUDINARY_API_KEY: 791878353926865
      CLOUDINARY_API_SECRET: AF5KmtdawbrBU0V8cIh6xguF3pg
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  appointments-service:
    build: ./backend/appointments-service
    container_name: carelabs-appointments-service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: appointments-service
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_appointments
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INTEGRATION_AUTH_SERVICE_BASE_URL: http://auth-service:8081
      INTEGRATION_PATIENT_SERVICE_BASE_URL: http://patient-service:8082
      INTEGRATION_DOCTOR_SERVICE_BASE_URL: http://doctor-service:8083
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

  notification-service:
    build: ./backend/notification-service
    container_name: carelabs-notification-service
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_notifications
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICES_AUTH_URL: http://auth-service:8081
      SERVICES_APPOINTMENT_URL: http://appointments-service:8084
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: wanjulasd2@gmail.com
      SPRING_MAIL_PASSWORD: lpszblbkahqjdakr
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
      APP_MAIL_FROM: wanjulasd2@gmail.com
      APP_MAIL_FROM_NAME: CareLabs Platform

  payment-service:
    build: ./backend/payment-service
    container_name: carelabs-payment-service
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: payment-service
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_payments
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APPOINTMENTS_SERVICE_BASE_URL: http://appointments-service:8084
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

  ai-symptom-service:
    build: ./backend/ai-symptom-service
    container_name: carelabs-ai-symptom-service
    ports:
      - "8088:8088"
    environment:
      SPRING_APPLICATION_NAME: ai-symptom-service
      SERVER_PORT: 8088
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

  api-gateway:
    build: ./backend/api-gateway
    container_name: carelabs-api-gateway
    ports:
      - "8090:8080"
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointments-service
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      # Auth Route
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: auth-service
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://auth-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/auth,/auth/**
      # Patient Routes (Protected)
      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: patient-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://patient-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/patients,/patients/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0_NAME: JwtAuthenticationFilter
      SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0_ARGS_REQUIRED_ROLES_0: PATIENT
      SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0_ARGS_REQUIRED_ROLES_1: ADMIN
      # Doctor Routes (Protected)
      SPRING_CLOUD_GATEWAY_ROUTES_2_ID: doctor-service-protected
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://doctor-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0: Path=/doctors/me,/doctors/me/**,/doctors/documents,/doctors/documents/**,/doctors/availability,/doctors/availability/**,/doctors/leave,/doctors/leave/**,/doctors/admin/**
      SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0_NAME: JwtAuthenticationFilter
      SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0_ARGS_REQUIRED_ROLES_0: DOCTOR
      SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0_ARGS_REQUIRED_ROLES_1: ADMIN
      # Doctor Routes (Public Access)
      SPRING_CLOUD_GATEWAY_ROUTES_3_ID: doctor-service-public
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://doctor-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0: Path=/doctors,/doctors/public/**,/doctors/*,/doctors/*/availability
      # Appointments
      SPRING_CLOUD_GATEWAY_ROUTES_4_ID: appointments-service
      SPRING_CLOUD_GATEWAY_ROUTES_4_URI: http://appointments-service:8084
      SPRING_CLOUD_GATEWAY_ROUTES_4_PREDICATES_0: Path=/appointments,/appointments/**
      SPRING_CLOUD_GATEWAY_ROUTES_4_FILTERS_0_NAME: JwtAuthenticationFilter
      SPRING_CLOUD_GATEWAY_ROUTES_4_FILTERS_0_ARGS_REQUIRED_ROLES_0: PATIENT
      SPRING_CLOUD_GATEWAY_ROUTES_4_FILTERS_0_ARGS_REQUIRED_ROLES_1: DOCTOR
      SPRING_CLOUD_GATEWAY_ROUTES_4_FILTERS_0_ARGS_REQUIRED_ROLES_2: ADMIN
      # Notifications
      SPRING_CLOUD_GATEWAY_ROUTES_5_ID: notification-service
      SPRING_CLOUD_GATEWAY_ROUTES_5_URI: http://notification-service:8086
      SPRING_CLOUD_GATEWAY_ROUTES_5_PREDICATES_0: Path=/notifications,/notifications/**
      SPRING_CLOUD_GATEWAY_ROUTES_5_FILTERS_0_NAME: JwtAuthenticationFilter
      SPRING_CLOUD_GATEWAY_ROUTES_5_FILTERS_0_ARGS_REQUIRED_ROLES_0: PATIENT
      SPRING_CLOUD_GATEWAY_ROUTES_5_FILTERS_0_ARGS_REQUIRED_ROLES_1: DOCTOR
      SPRING_CLOUD_GATEWAY_ROUTES_5_FILTERS_0_ARGS_REQUIRED_ROLES_2: ADMIN
      # Payments (Public/Gateway Side)
      SPRING_CLOUD_GATEWAY_ROUTES_6_ID: payment-service-public
      SPRING_CLOUD_GATEWAY_ROUTES_6_URI: http://payment-service:8087
      SPRING_CLOUD_GATEWAY_ROUTES_6_PREDICATES_0: Path=/payments/notify
      # Payments (Protected)
      SPRING_CLOUD_GATEWAY_ROUTES_7_ID: payment-service-protected
      SPRING_CLOUD_GATEWAY_ROUTES_7_URI: http://payment-service:8087
      SPRING_CLOUD_GATEWAY_ROUTES_7_PREDICATES_0: Path=/payments,/payments/**
      SPRING_CLOUD_GATEWAY_ROUTES_7_FILTERS_0_NAME: JwtAuthenticationFilter
      SPRING_CLOUD_GATEWAY_ROUTES_7_FILTERS_0_ARGS_REQUIRED_ROLES_0: PATIENT
      SPRING_CLOUD_GATEWAY_ROUTES_7_FILTERS_0_ARGS_REQUIRED_ROLES_1: ADMIN
      # AI Symptom — controller maps to /ai, endpoint is /ai/symptom-check
      SPRING_CLOUD_GATEWAY_ROUTES_8_ID: ai-symptom-service
      SPRING_CLOUD_GATEWAY_ROUTES_8_URI: http://ai-symptom-service:8088
      SPRING_CLOUD_GATEWAY_ROUTES_8_PREDICATES_0: Path=/ai,/ai/**
      SPRING_CLOUD_GATEWAY_ROUTES_8_FILTERS_0_NAME: JwtAuthenticationFilter
      SPRING_CLOUD_GATEWAY_ROUTES_8_FILTERS_0_ARGS_REQUIRED_ROLES_0: PATIENT
      SPRING_CLOUD_GATEWAY_ROUTES_8_FILTERS_0_ARGS_REQUIRED_ROLES_1: DOCTOR
      SPRING_CLOUD_GATEWAY_ROUTES_8_FILTERS_0_ARGS_REQUIRED_ROLES_2: ADMIN
      # Security
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

  # ─── Frontend Layer ──────────────────────────────────────────────────────
  # Frontend is run locally: cd frontend && npm install && npm run dev
  # npm install inside Docker fails on Windows Docker Desktop due to network (ECONNRESET).
  # frontend:
  #   build: ./frontend
  #   container_name: carelabs-frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api-gateway
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8080

volumes:
  postgres-data:
