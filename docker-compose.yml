version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:15-alpine
    container_name: carelabs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    networks:
      - carelabs-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: carelabs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - carelabs-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: carelabs-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - carelabs-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: carelabs-kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - carelabs-network

  # --- BACKEND SERVICES ---
  auth-service:
    build: ./backend/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_auth
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: your-512-bit-secret-key-goes-here
    networks:
      - carelabs-network

  patient-service:
    build: ./backend/patient-service
    container_name: patient-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_patients
    networks:
      - carelabs-network

  doctor-service:
    build: ./backend/doctor-service
    container_name: doctor-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_doctors
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - carelabs-network

  appointments-service:
    build: ./backend/appointments-service
    container_name: appointments-service
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_appointments
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:8081
      PATIENT_SERVICE_URL: http://patient-service:8082
      DOCTOR_SERVICE_URL: http://doctor-service:8083
    networks:
      - carelabs-network

  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_notifications
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:8081
      APPOINTMENTS_SERVICE_URL: http://appointments-service:8084
      DOCTOR_SERVICE_URL: http://doctor-service:8083
    networks:
      - carelabs-network

  payment-service:
    build: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carelabs_payments
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APPOINTMENTS_SERVICE_URL: http://appointments-service:8084
    networks:
      - carelabs-network

  ai-symptom-service:
    build: ./backend/ai-symptom-service
    container_name: ai-symptom-service
    ports:
      - "8088:8088"
    networks:
      - carelabs-network

  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointments-service
      - payment-service
      - ai-symptom-service
    environment:
      # Routing overrides to use container names instead of localhost
      AUTH_SERVICE_URL: http://auth-service:8081
      PATIENT_SERVICE_URL: http://patient-service:8082
      DOCTOR_SERVICE_URL: http://doctor-service:8083
      APPOINTMENTS_SERVICE_URL: http://appointments-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      PAYMENT_SERVICE_URL: http://payment-service:8085
      AI_SYMPTOM_SERVICE_URL: http://ai-symptom-service:8088
      JWT_SECRET: your-512-bit-secret-key-goes-here
    networks:
      - carelabs-network

  # --- FRONTEND ---
  frontend:
    build: ./frontend
    container_name: carelabs-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - carelabs-network

networks:
  carelabs-network:
    driver: bridge

volumes:
  postgres-data:
